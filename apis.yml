aid: national-library-of-medicine
name: National Library of Medicine
description: >-
  The National Library of Medicine, part of the National Institutes of Health,
  is the world's largest biomedical library. It collects, organizes, and
  provides access to medical literature and information to support research and
  decision-making in healthcare, including PubMed and ClinicalTrials.gov.
