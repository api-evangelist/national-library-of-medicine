          mapping: $.
    - path: /egquery.fcgi
      name: egquery
      operations:
      - method: GET
        name: egquery
        description: Global cross-database query
        call: national-library-of-medicine.egquery
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: national-library-of-medicine-mcp
    transport: http
    description: MCP adapter for NCBI E-utilities API for AI agent use.
